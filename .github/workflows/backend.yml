name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency vulnerability review
        uses: actions/dependency-review-action@v4

  build:
    runs-on: ubuntu-latest
    if: "!(github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[push]'))"
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Build application (Maven)
        run: ./mvnw -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Run tests
        run: ./mvnw -B test

      - name: Check coverage and warn if < 80%
        if: always()
        run: node ../scripts/ci/check-backend-coverage.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/*.xml

  sonarcloud:
    name: SonarCloud Backend
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Build and analyze backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.projectKey=dermatrack_backend \
            -Dsonar.organization=${SONAR_ORGANIZATION}
