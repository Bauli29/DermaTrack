name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run full deploy pipeline manually"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────

  backend-build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[push]') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Build application (Maven)
        run: ./mvnw -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-backend-jar
          path: backend/target/*.jar

  backend-test:
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Run tests
        run: ./mvnw -B test

      - name: Check coverage and warn if < 80%
        if: always()
        run: node ../scripts/ci/check-backend-coverage.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-backend-test-reports
          path: backend/target/surefire-reports/*.xml

  backend-deploy:
    runs-on: ubuntu-latest
    needs: [backend-build, backend-test]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dermatrack-backend:${{ github.sha }} .

      - name: Deploy backend
        run: |
          echo "Backend deploy triggered by [push] token or manual dispatch."
          echo "Configure registry auth and push commands here."
        # NOTE: Primary deployment remains handled automatically by Render integration

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend-build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[push]') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-frontend-build
          path: frontend/.next

  frontend-lint:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm run lint:check

      - name: Check code formatting
        run: pnpm run format:check

      - name: Type check
        run: pnpm exec tsc --noEmit

  frontend-jest:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest unit tests
        run: pnpm exec jest --ci --coverage

  frontend-playwright:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: deploy-playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  frontend-deploy:
    runs-on: ubuntu-latest
    needs: [frontend-build, frontend-lint, frontend-jest, frontend-playwright]

    steps:
      - name: Deploy frontend
        run: |
          echo "Frontend deploy triggered by [push] token or manual dispatch."
          echo "Primary deployment handled by Vercel dashboard integration on main."
