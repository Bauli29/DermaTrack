# Profile: local-h2
# Purpose: daily local development with in-memory H2 and mock seed data.
spring:
  datasource:
    url: jdbc:h2:mem:dev
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
        trace: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  auth:
    username: _
    password: _
  jwt:
    access-secret: local-dev-access-secret-must-be-at-least-32bytes!
    refresh-secret: local-dev-refresh-secret-must-be-at-least-32bytes!
  mockdata:
    enabled: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    "[de.dermatrack]": INFO
    "[org.hibernate.SQL]": WARN
