# Profile: prod
# Purpose: production runtime configuration for deployment.
spring:
  datasource:
    url: ${DATABASE_URL}
  jpa:
    show-sql: false

app:
  auth:
    username: ${AUTH_USERNAME}
    password: ${AUTH_PASSWORD}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}

logging:
  level:
    "[de.dermatrack]": INFO
    "[org.hibernate.SQL]": WARN
