# Base configuration shared by all profiles.
# Keep only common defaults here; profile-specific overrides belong in application-<profile>.yml.
spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        jdbc:
          lob:
            "[non_contextual_creation]": true
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
  jackson:
    deserialization:
      fail-on-unknown-properties: true

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:default-dev-access-secret-must-be-at-least-32bytes!}
    refresh-secret: ${JWT_REFRESH_SECRET:default-dev-refresh-secret-must-be-at-least-32bytes!}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  security:
    cors:
      allowed-origins:
        - http://localhost:3000
        - https://derma-track.vercel.app
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - Accept
      allow-credentials: true
      max-age-seconds: 3600
  uploads:
    images:
      storage-path: ${DERMATRACK_UPLOAD_DIR:uploads/images}
      max-file-size-bytes: 5242880
      allowed-content-types:
        - image/jpeg
        - image/png

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50
      min-spare: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    "[org.springframework.web]": INFO
    "[org.springframework.security]": WARN
    "[de.dermatrack]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.springdoc]": DEBUG
    "[web]": DEBUG
