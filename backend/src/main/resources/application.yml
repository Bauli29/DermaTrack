# Base configuration shared by all profiles.
# Keep only common defaults here; profile-specific overrides belong in application-<profile>.yml.
spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        jdbc:
          lob:
            "[non_contextual_creation]": true
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50
      min-spare: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    "[org.springframework.web]": INFO
    "[org.springframework.security]": WARN
    "[de.dermatrack]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.springdoc]": DEBUG
    "[web]": DEBUG

app:
  security:
    cors:
      allowed-origins:
        - http://localhost:3000
        - https://derma-track.vercel.app
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - Accept
      allow-credentials: true
      max-age-seconds: 3600
